name: Build Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for a manual release (e.g. v1.0.0b).'
        required: true
        default: ''
  push:
    branches:
    - 'main'
    paths:
      - '**'
      - '!.gitignore'
      - '!*.md'
      - '!.github/**'
      - '.github/workflows/nightly.yml'
permissions:
  contents: write
concurrency:
  group: release
  cancel-in-progress: true
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [Windows64]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Set platform lowercase
      run: echo "MATRIX_PLATFORM=$('${{ matrix.platform }}'.ToLower())" >> $env:GITHUB_ENV
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Run CMake
      uses: lukka/run-cmake@v10
      env:
        VCPKG_ROOT: "" # Disable vcpkg for CI builds
      with:
        configurePreset: ${{ env.MATRIX_PLATFORM }}
        buildPreset: ${{ env.MATRIX_PLATFORM }}-release
        buildPresetAdditionalArgs: "['--target', 'Minecraft.Client']"
        
    - name: Zip Build
      run: 7z a -r LCE${{ matrix.platform }}.zip ./build/${{ env.MATRIX_PLATFORM }}/Minecraft.Client/Release/* "-x!*.ipdb" "-x!*.iobj"
    - name: Stage artifacts
      run: |
        New-Item -ItemType Directory -Force -Path staging
        Copy-Item LCE${{ matrix.platform }}.zip staging/
        
    - name: Stage exe and pdb
      if: matrix.platform == 'Windows64'
      run: |
        Copy-Item ./build/${{ env.MATRIX_PLATFORM }}/Minecraft.Client/Release/Minecraft.Client.exe staging/
    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-${{ matrix.platform }}
        path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts
        merge-multiple: true

    - name: Release
      if: github.event_name == 'workflow_dispatch' && inputs.version != ''
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ inputs.version }}
        name: ${{ inputs.version }}
        body_path: .github/NOTES.md
        target_commitish: ${{ github.sha }}
        files: artifacts/*
        draft: false
        prerelease: false
  
  cleanup:
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Cleanup artifacts
      uses: geekyeggo/delete-artifact@v5
      with:
        name: build-*